<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinamento AED — Estrutura de Dados | Faculdade Vincit</title>
<style>
  :root{
    --roxo:#2E1A6B; --roxo2:#4B2E9E; --vinho:#8B1A1A; --vinho2:#a83232;
    --bg:#F2F2F2; --card:#ffffff; --texto:#22203a; --muted:#6b6880;
    --linha:#e3e1ee; --ok:#2f7d4f; --erro:#a83232; --lock:#b8b5c7;
    --codebg:#221a3a; --sombra:0 2px 10px rgba(46,26,107,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--texto);line-height:1.55;font-size:16px}
  a{color:var(--roxo2)}
  button{font-family:inherit}
  .wrap{max-width:920px;margin:0 auto;padding:0 16px 64px}

  /* Cabeçalho */
  header.top{background:var(--roxo);color:#fff;padding:18px 0;box-shadow:var(--sombra);position:sticky;top:0;z-index:20}
  header.top .wrap{padding-bottom:0;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:12px}
  .logo .mark{width:34px;height:34px;flex:0 0 auto}
  .logo .txt{line-height:1.1}
  .logo .txt b{display:block;font-size:15px;letter-spacing:.5px}
  .logo .txt span{font-size:12px;color:#d6cff0}
  .top-right{margin-left:auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .xpbox{font-size:13px;color:#e9e5fb;text-align:right}
  .xpbox b{color:#fff;font-size:16px}
  .badges{display:flex;gap:6px}
  .badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;border:2px solid #6a54c0;color:#b8abe6;background:#3a2585}
  .badge.on{background:var(--vinho);border-color:var(--vinho2);color:#fff}
  .btn-reset{background:transparent;border:1px solid #7a68c4;color:#e9e5fb;border-radius:8px;
    padding:6px 10px;font-size:12px;cursor:pointer}
  .btn-reset:hover{background:#3a2585}

  .progressbar{height:8px;background:#3a2585;border-radius:999px;overflow:hidden;margin-top:14px}
  .progressbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--vinho),var(--vinho2));width:0;transition:width .4s}
  .progresslabel{font-size:12px;color:#d6cff0;margin-top:6px}

  h1.page{font-size:22px;color:var(--roxo);margin:26px 0 4px}
  .sub{color:var(--muted);margin:0 0 18px;font-size:14px}

  /* Trilha */
  .trilha{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .node{background:var(--card);border:1px solid var(--linha);border-radius:14px;padding:16px;
    box-shadow:var(--sombra);cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;
    display:flex;flex-direction:column;gap:8px;text-align:left;width:100%;font:inherit;color:inherit}
  .node:hover:not(.lock){transform:translateY(-2px);box-shadow:0 6px 18px rgba(46,26,107,.16)}
  .node:focus-visible{outline:3px solid var(--roxo2);outline-offset:2px}
  .node .num{width:34px;height:34px;border-radius:9px;background:var(--roxo);color:#fff;font-weight:700;
    display:flex;align-items:center;justify-content:center;font-size:15px}
  .node.done .num{background:var(--ok)}
  .node.lock{opacity:.65;cursor:not-allowed;background:#eceaf3}
  .node.lock .num{background:var(--lock)}
  .node h3{margin:0;font-size:16px;color:var(--roxo)}
  .node.lock h3{color:#8a879c}
  .node .meta{font-size:12px;color:var(--muted)}
  .node .status{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .node.done .status{color:var(--ok)}
  .node.avail .status{color:var(--vinho)}
  .node.lock .status{color:#9a97ab}
  .unit-head{grid-column:1/-1;margin:18px 0 2px;padding-top:8px;border-top:2px solid var(--linha)}
  .unit-head:first-child{border-top:none}
  .unit-head h2{margin:0;font-size:15px;color:var(--vinho);text-transform:uppercase;letter-spacing:1px}

  /* Nível */
  .lvl-top{display:flex;align-items:center;gap:12px;margin:22px 0 4px;flex-wrap:wrap}
  .btn-back{background:var(--roxo);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:14px}
  .btn-back:hover{background:var(--roxo2)}
  .lvl-top h1{font-size:21px;color:var(--roxo);margin:0}
  .section{background:var(--card);border:1px solid var(--linha);border-radius:14px;padding:20px 22px;
    margin:16px 0;box-shadow:var(--sombra)}
  .section > h2{margin:0 0 4px;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--vinho)}
  .section > h2 + .tag{color:var(--muted);font-size:12px;margin:0 0 12px}
  .section p{margin:10px 0}
  .section code{background:#efeafc;color:var(--roxo);padding:1px 5px;border-radius:4px;
    font-family:"SF Mono",Menlo,Consolas,monospace;font-size:.9em}
  .section h4{color:var(--roxo);margin:16px 0 4px;font-size:15px}
  .analogy{border-left:4px solid var(--roxo2);background:#f4f1fc;padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0}
  .analogy b{color:var(--roxo)}
  .note{border-left:4px solid var(--vinho);background:#fbf1f1;padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0;font-size:14px}
  .note b{color:var(--vinho)}
  ul.tight{margin:8px 0;padding-left:20px}
  ul.tight li{margin:4px 0}

  pre.code,pre.out{overflow-x:auto;border-radius:10px;padding:14px 16px;margin:12px 0;
    font-family:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;font-size:13.5px;line-height:1.5;-webkit-overflow-scrolling:touch}
  pre.code{background:var(--codebg);color:#e8e4ff}
  pre.out{background:#111;color:#d6d6d6;border:1px solid #333}
  pre.out::before{content:"console";display:block;color:#777;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .tok-kw{color:#c792ea}
  .tok-ty{color:#82aaff}
  .tok-fn{color:#ffcb6b}
  .tok-str{color:#c3e88d}
  .tok-com{color:#7a7597;font-style:italic}
  .tok-num{color:#f78c6c}
  .tok-op{color:#89ddff}

  /* Quiz */
  .q{border-top:1px solid var(--linha);padding:16px 0}
  .q:first-of-type{border-top:none}
  .q .qtext{font-weight:600;margin-bottom:10px}
  .q .qtext .n{color:var(--vinho);margin-right:6px}
  .alt{display:block;width:100%;text-align:left;background:#faf9fe;border:1.5px solid var(--linha);
    border-radius:10px;padding:11px 14px;margin:7px 0;cursor:pointer;font-size:15px;color:var(--texto);transition:.12s}
  .alt:hover{border-color:var(--roxo2)}
  .alt:focus-visible{outline:3px solid var(--roxo2);outline-offset:2px}
  .alt.sel{border-color:var(--roxo2);background:#efeafc}
  .alt.ok{border-color:var(--ok);background:#eef7f1}
  .alt.bad{border-color:var(--erro);background:#fbeeee}
  .alt .fb{display:block;font-size:13px;color:var(--muted);margin-top:6px}
  .alt.ok .fb{color:var(--ok)}
  .alt.bad .fb{color:var(--erro)}
  .quizbar{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}
  .btn{background:var(--vinho);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:15px;cursor:pointer}
  .btn:hover{background:var(--vinho2)}
  .btn.sec{background:var(--roxo)}
  .btn.sec:hover{background:var(--roxo2)}
  .btn:disabled{background:#c7c3d6;cursor:not-allowed}
  .result{font-weight:700;font-size:14px}
  .result.ok{color:var(--ok)}
  .result.bad{color:var(--erro)}

  textarea.disc{width:100%;min-height:120px;border:1.5px solid var(--linha);border-radius:10px;padding:12px;
    font-family:inherit;font-size:15px;resize:vertical}
  textarea.disc:focus-visible{outline:3px solid var(--roxo2);outline-offset:1px}
  .disc-fb{margin-top:12px}
  .keymiss{color:var(--erro);font-size:14px}
  .keymiss b{color:var(--erro)}
  .gab{border-left:4px solid var(--ok);background:#eef7f1;padding:10px 14px;border-radius:0 8px 8px 0;margin-top:10px;font-size:14px}

  .done-banner{background:linear-gradient(90deg,var(--roxo),var(--roxo2));color:#fff;border-radius:14px;
    padding:20px 22px;margin:16px 0;box-shadow:var(--sombra)}
  .done-banner h3{margin:0 0 6px}
  .done-banner .xpplus{color:#ffd; font-weight:700}
  .badge-pop{background:var(--vinho);color:#fff;border-radius:10px;padding:12px 16px;margin-top:12px;font-weight:600}

  /* Tela final */
  .final{text-align:center;background:var(--card);border:1px solid var(--linha);border-radius:16px;
    padding:40px 24px;box-shadow:var(--sombra);margin-top:26px}
  .final h1{color:var(--roxo);font-size:26px;margin:0 0 8px}
  .final .big{font-size:44px;font-weight:800;color:var(--vinho);margin:10px 0}
  .final .fbadges{display:flex;gap:14px;justify-content:center;margin:18px 0}
  .final .fbadges .badge{width:56px;height:56px;font-size:13px}

  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px 0 8px}
  @media (max-width:560px){
    body{font-size:15px}
    .section{padding:16px}
    h1.page{font-size:20px}
  }
</style>
</head>
<body>
<header class="top">
  <div class="wrap">
    <div class="logo">
      <svg class="mark" viewBox="0 0 40 40" aria-hidden="true">
        <polygon points="2,10 20,2 20,14 2,22" fill="#4B2E9E"/>
        <polygon points="2,20 20,12 20,24 2,32" fill="#2E1A6B"/>
        <polygon points="20,2 38,10 38,22 20,14" fill="#8B1A1A"/>
      </svg>
      <div class="txt"><b>FACULDADE VINCIT</b><span>Estrutura de Dados — Treinamento</span></div>
    </div>
    <div class="top-right">
      <div class="badges" id="badges" title="Badges por unidade"></div>
      <div class="xpbox">XP <b id="xp">0</b></div>
      <button class="btn-reset" id="btnReset" type="button">Reiniciar progresso</button>
    </div>
    <div style="flex-basis:100%">
      <div class="progressbar"><i id="progFill"></i></div>
      <div class="progresslabel" id="progLabel">0 de 18 níveis concluídos</div>
    </div>
  </div>
</header>

<main class="wrap" id="app"></main>
<footer>Faculdade Vincit · Engenharia de Software · Conteúdo baseado na apostila oficial (Unidades 3, 4 e 5).</footer>

<script>
"use strict";
/* ============================================================================
   CONTEÚDO DOS NÍVEIS  —  editável sem tocar na lógica de renderização.
   Blocos aceitos em `didatica` e `tecnica`:
     {t:'p',   html}   parágrafo
     {t:'h',   html}   subtítulo
     {t:'ul',  items:[..]}  lista
     {t:'analogy', html}    caixa de analogia (didática)
     {t:'note', html}       caixa de alerta/nota
     {t:'code', c}     bloco de código C (com destaque de sintaxe)
     {t:'out',  c}     saída de console
   Quiz: cada questão {q, alts:[{txt, ok:bool, fb}]}  (fb explica a alternativa)
   Discursiva: {enunciado, chaves:[{termo, sinonimos:[], peso}], corte, gabarito}
   ============================================================================ */
const NIVEIS = [

/* ==================== NÍVEL 1 ==================== */
{
  n:1, unidade:3, titulo:"Memória Volátil (RAM) e Arquitetura de Von Neumann",
  slides:"Apostila Ponteiros · slides 2–3",
  didatica:[
    {t:'p', html:"Pense na memória RAM como a <b>bancada de uma cozinha</b>. A despensa (o disco rígido, mesmo um SSD ou pen drive) guarda tudo, mas ninguém cozinha dentro da despensa: você traz para a bancada só o que vai usar agora, porque na bancada o cozinheiro (o processador) alcança tudo rapidinho."},
    {t:'analogy', html:"A despensa é maior e mais barata, porém caminhar até ela é lento. A <b>RAM é a intermediadora</b>: coloca em evidência as informações que serão processadas, justamente porque o disco — ainda que flash/SSD — é mais lento que a memória volátil."},
    {t:'p', html:"Na <b>Arquitetura de Von Neumann</b>, a receita e os ingredientes ficam na mesma gaveta: o <b>programa e os dados dividem o mesmo espaço de memória</b>. É por isso que a máquina consegue manipular o próprio programa como se fosse dado."}
  ],
  tecnica:[
    {t:'p', html:"A <b>memória volátil</b> (RAM — <i>Random Access Memory</i>) armazena as informações temporárias do Sistema Operacional e dos aplicativos."},
    {t:'ul', items:[
      "É um <b>intermediador</b> entre os arquivos do disco rígido e o processador, colocando em evidência as informações a serem processadas.",
      "O disco rígido, <b>ainda que seja unidade flash ou SSD</b>, tem velocidade inferior à da memória volátil.",
      "A <b>Arquitetura de Von Neumann</b> permite que a máquina digital armazene seus programas no <b>mesmo espaço de memória que os dados</b>, podendo assim manipular tais programas."
    ]}
  ],
  quiz:[
    {q:"Qual é o papel da memória volátil (RAM) descrito na apostila?", alts:[
      {txt:"Ser a intermediadora entre os arquivos do disco rígido e o processador.", ok:true, fb:"Ela evidencia as informações a serem processadas."},
      {txt:"Armazenar permanentemente os arquivos, substituindo o disco rígido.", ok:false, fb:"Errado: a RAM guarda informações <i>temporárias</i>; o armazenamento permanente é do disco."},
      {txt:"Processar diretamente os cálculos no lugar do processador.", ok:false, fb:"Errado: quem processa é o processador; a RAM apenas disponibiliza os dados."},
      {txt:"Servir de cópia de segurança (backup) do disco rígido.", ok:false, fb:"Errado: a apostila não atribui função de backup à RAM; ela é volátil e temporária."}
    ]},
    {q:"Por que os dados são levados para a RAM em vez de processados direto do disco?", alts:[
      {txt:"Porque o disco, mesmo SSD/flash, tem velocidade inferior à da memória volátil.", ok:true, fb:"Exato: a lentidão relativa do disco justifica a intermediação."},
      {txt:"Porque o disco não consegue armazenar programas, apenas dados.", ok:false, fb:"Errado: o disco armazena tanto programas quanto dados."},
      {txt:"Porque a RAM tem capacidade de armazenamento infinita.", ok:false, fb:"Errado: a apostila não afirma capacidade infinita; a vantagem citada é a velocidade."},
      {txt:"Porque o SSD é mais rápido que a RAM e por isso a alimenta.", ok:false, fb:"Errado: é o contrário — a RAM é mais rápida que o disco/SSD."}
    ]},
    {q:"O que caracteriza a Arquitetura de Von Neumann?", alts:[
      {txt:"Programa e dados são armazenados no mesmo espaço de memória.", ok:true, fb:"Correto, e isso permite manipular o próprio programa."},
      {txt:"Programa e dados ficam em espaços de memória fisicamente separados.", ok:false, fb:"Errado: a separação de espaços é justamente o que Von Neumann <i>não</i> faz."},
      {txt:"Apenas dados são armazenados na memória; o programa fica no processador.", ok:false, fb:"Errado: o programa também reside na memória, junto dos dados."},
      {txt:"A memória só pode ser acessada de forma sequencial, nunca aleatória.", ok:false, fb:"Errado: a RAM é de acesso aleatório (Random Access Memory)."}
    ]},
    {q:"O termo memória \"volátil\" indica que ela:", alts:[
      {txt:"Guarda informações temporárias do SO e dos aplicativos.", ok:true, fb:"Correto — é a natureza temporária/volátil descrita na apostila."},
      {txt:"Guarda informações de forma permanente entre reinicializações.", ok:false, fb:"Errado: permanência é característica do disco, não da RAM volátil."},
      {txt:"Só funciona quando o disco rígido está desligado.", ok:false, fb:"Errado: RAM e disco trabalham juntos, não em exclusão."},
      {txt:"É mais lenta que o disco por ser temporária.", ok:false, fb:"Errado: a RAM é mais rápida que o disco, e velocidade não decorre de ser temporária."}
    ]}
  ],
  discursiva:{
    enunciado:"Explique o papel da memória volátil (RAM) como intermediadora entre o disco e o processador e por que os dados não são processados diretamente do disco.",
    chaves:[
      {termo:"intermediadora", sinonimos:["intermediador","intermedia","ponte"], peso:2},
      {termo:"processador", sinonimos:["cpu"], peso:1},
      {termo:"disco", sinonimos:["disco rigido","ssd","flash","hd"], peso:1},
      {termo:"velocidade inferior", sinonimos:["mais lento","mais lenta","lentidao","menor velocidade","lento"], peso:2}
    ],
    corte:0.7,
    gabarito:"A RAM é a intermediadora entre o disco e o processador: ela coloca em evidência as informações a serem processadas. Como o disco (mesmo SSD/flash) tem velocidade inferior à da memória volátil, os dados são carregados na RAM para que o processador os acesse rapidamente."
  }
},

/* ==================== NÍVEL 2 ==================== */
{
  n:2, unidade:3, titulo:"Estrutura Linear da Memória e Tipos de Endereçamento",
  slides:"Apostila Ponteiros · slides 4–5",
  didatica:[
    {t:'p', html:"A memória é organizada como um <b>prédio muito bem numerado</b>. O tijolo é o <b>bit</b> (0 ou 1); 8 tijolos formam um <b>byte</b>; 4096 bytes formam uma <b>página</b>; 256 páginas formam um <b>segmento</b>. Tudo empilhado de forma linear."},
    {t:'analogy', html:"Sobre os <b>três endereços</b>: o <b>absoluto</b> é a planta da construtora — a posição física real que o operário (processador) usa. O <b>real</b> é a numeração oficial que a prefeitura dá a cada porta; o hardware converte esse número para a posição física por prefixação. O <b>virtual</b> é o número que <i>o morador</i> usa dentro do seu próprio apartamento: cada aplicativo enxerga a sua memória isolada, sem invadir a do vizinho."}
  ],
  tecnica:[
    {t:'p', html:"A memória digital é estruturada de forma <b>linear</b>, organizando seus espaços em:"},
    {t:'ul', items:[
      "<b>bit</b> (0..1)",
      "<b>byte</b> — agrupamento de 8 bits",
      "<b>página</b> — agrupamento de 4096 bytes",
      "<b>segmento</b> — agrupamento de 256 páginas"
    ]},
    {t:'h', html:"Três tipos de endereçamento"},
    {t:'ul', items:[
      "<b>Endereço absoluto:</b> associa a localização <b>física</b> na memória central; é usado pelos processadores para acessar os blocos de dados da memória física.",
      "<b>Endereço real:</b> quando utilizado, é convertido para um endereço absoluto por <b>prefixação, feita pelo próprio hardware</b>. Para cada endereço real existe um endereço físico — o computador atribui <b>um endereço real para cada byte</b>.",
      "<b>Endereço virtual:</b> é convertido para real e, em seguida, para absoluto. A memória virtual é a disponível para cada aplicação — o computador <b>isola a memória de cada programa</b>, impedindo que um aplicativo acesse a memória de outro."
    ]}
  ],
  quiz:[
    {q:"Qual é a ordem correta da estrutura linear da memória?", alts:[
      {txt:"bit → byte (8 bits) → página (4096 bytes) → segmento (256 páginas)", ok:true, fb:"Correto, exatamente a hierarquia da apostila."},
      {txt:"bit → byte (16 bits) → segmento (4096 bytes) → página (256 segmentos)", ok:false, fb:"Errado: o byte tem 8 bits, e a ordem página→segmento está trocada."},
      {txt:"byte → bit (8 bytes) → página (256 bits) → segmento (4096 páginas)", ok:false, fb:"Errado: o bit é a menor unidade, não o byte; e os agrupamentos estão invertidos."},
      {txt:"bit → byte (8 bits) → segmento (4096 bytes) → página (256 segmentos)", ok:false, fb:"Errado: 4096 bytes formam uma página, e 256 páginas formam um segmento."}
    ]},
    {q:"O endereço absoluto é aquele que:", alts:[
      {txt:"Associa a localização física e é usado pelos processadores para acessar a memória física.", ok:true, fb:"Correto — é o endereço físico usado pelo processador."},
      {txt:"É convertido para um endereço físico por prefixação do hardware.", ok:false, fb:"Errado: quem passa por prefixação é o endereço <i>real</i>; o absoluto já é o físico."},
      {txt:"Isola a memória de cada aplicação para que uma não acesse a outra.", ok:false, fb:"Errado: esse isolamento é papel do endereço <i>virtual</i>."},
      {txt:"Existe apenas dentro do espaço reservado a um único programa.", ok:false, fb:"Errado: essa restrição por programa descreve o endereço virtual."}
    ]},
    {q:"Sobre o endereço real, é correto afirmar que:", alts:[
      {txt:"É convertido para absoluto por prefixação feita pelo hardware, havendo um endereço real por byte.", ok:true, fb:"Correto — para cada endereço real existe um endereço físico."},
      {txt:"É convertido primeiro para virtual e depois para absoluto.", ok:false, fb:"Errado: a cadeia é virtual → real → absoluto, não real → virtual."},
      {txt:"É o endereço que cada aplicação enxerga de forma isolada.", ok:false, fb:"Errado: a visão isolada por aplicação é do endereço virtual."},
      {txt:"É a localização física usada diretamente pelo processador.", ok:false, fb:"Errado: a localização física usada pelo processador é o endereço absoluto."}
    ]},
    {q:"Qual endereço isola a memória de cada aplicação, impedindo um programa de acessar a memória de outro?", alts:[
      {txt:"Endereço virtual.", ok:true, fb:"Correto — a memória virtual é a disponível para cada aplicação, isolada."},
      {txt:"Endereço absoluto.", ok:false, fb:"Errado: o absoluto é a posição física usada pelo processador, não isola aplicações."},
      {txt:"Endereço real.", ok:false, fb:"Errado: o real é convertido em absoluto por prefixação; o isolamento é do virtual."},

    {t:'code', c:`int calcularFatorial(int numero) {

}
int main(int argc, char const *argv[]) {

/* ---------- destaque de sintaxe C (scanner simples) ---------- */
const KW = new Set(["int","char","float","double","void","return","for","if","else","while","struct","typedef","static","const","unsigned","signed","short","long","sizeof"]);
const TY = new Set(["int","char","float","double","void","Aluno","struct","unsigned","signed","short","long"]);
const FN = new Set(["printf","scanf","malloc","calloc","realloc","free","strcpy","fflush","main","calcularFatorial","imprimeFibonnaci","retornarArray","funcao","incluirAluno"]);
function esc(c){ return c==="&"?"&amp;":c==="<"?"&lt;":c===">"?"&gt;":c; }
function highlightC(src){
  let out="", i=0, n=src.length;
  const isId = c=>/[A-Za-z0-9_]/.test(c);
  while(i<n){
    const c=src[i];
    if(c==="/"&&src[i+1]==="/"){ let j=i; while(j<n&&src[j]!=="\n")j++; out+='<span class="tok-com">'+[...src.slice(i,j)].map(esc).join("")+'</span>'; i=j; continue; }
    if(c==='"'){ let j=i+1; while(j<n&&!(src[j]==='"'&&src[j-1]!=="\\"))j++; j++; out+='<span class="tok-str">'+[...src.slice(i,j)].map(esc).join("")+'</span>'; i=j; continue; }
    if(c==="'"){ let j=i+1; while(j<n&&!(src[j]==="'"&&src[j-1]!=="\\"))j++; j++; out+='<span class="tok-str">'+[...src.slice(i,j)].map(esc).join("")+'</span>'; i=j; continue; }
    if(/[A-Za-z_]/.test(c)){ let j=i; while(j<n&&isId(src[j]))j++; const w=src.slice(i,j);
      let cls = KW.has(w)?"tok-kw": TY.has(w)?"tok-ty": FN.has(w)?"tok-fn": null;
      out += cls? '<span class="'+cls+'">'+w+'</span>' : w; i=j; continue; }
    if(/[0-9]/.test(c)){ let j=i; while(j<n&&/[0-9.xXa-fA-F]/.test(src[j]))j++; out+='<span class="tok-num">'+src.slice(i,j)+'</span>'; i=j; continue; }
    if("+-*/=<>&|%!".includes(c)){ out+='<span class="tok-op">'+esc(c)+'</span>'; i++; continue; }
    out+=esc(c); i++;
  }
  return out;
}

function renderBlocos(blocos){
  return blocos.map(b=>{
    switch(b.t){
      case 'p': return '<p>'+b.html+'</p>';
      case 'h': return '<h4>'+b.html+'</h4>';
      case 'ul': return '<ul class="tight">'+b.items.map(x=>'<li>'+x+'</li>').join("")+'</ul>';
      case 'analogy': return '<div class="analogy">'+b.html+'</div>';
      case 'note': return '<div class="note">'+b.html+'</div>';
      case 'code': return '<pre class="code">'+highlightC(b.c)+'</pre>';
      case 'out': return '<pre class="out">'+[...b.c].map(esc).join("")+'</pre>';
      default: return '';
    }
  }).join("");
}

/* ---------- normalização de texto p/ discursiva ---------- */
function norm(s){
  return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/\s+/g," ").trim();
}
function corrigirDiscursiva(d, resposta){
  const r = norm(resposta);
  let total=0, obtido=0; const faltaram=[];
  d.chaves.forEach(ch=>{
    total += ch.peso;
    const termos = [ch.termo, ...(ch.sinonimos||[])].map(norm);
    const achou = termos.some(t=> t && r.includes(t));
    if(achou) obtido += ch.peso; else faltaram.push(ch.termo);
  });
  const perc = total>0 ? obtido/total : 0;
  return {perc, faltaram, passou: perc >= (d.corte||0.7)};
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

}

    // já concluído: mostra tudo resolvido e permite revisão
    document.getElementById("quizResult").innerHTML = '<span class="result ok">Quiz já concluído ✓</span>';
    document.getElementById("discResult").innerHTML = '<span class="result ok">Discursiva já concluída ✓</span>';
    mostrarConcluido(niv, false);
  }
}

function renderQuiz(niv){
  const body=document.getElementById("quizBody"); body.innerHTML="";
  niv.quiz.forEach((q, qi)=>{
    const div=document.createElement("div"); div.className="q";
    div.innerHTML = '<div class="qtext"><span class="n">'+(qi+1)+'.</span>'+q.q+'</div>';
    sessao.ordem[qi].forEach((alt, ai)=>{
      const b=document.createElement("button"); b.type="button"; b.className="alt";
      b.innerHTML = alt.txt;
      b.addEventListener("click", ()=>{
        if(sessao.quizOk) return;
        sessao.sel[qi]=ai;
        div.querySelectorAll(".alt").forEach(x=>x.classList.remove("sel"));
        b.classList.add("sel");
      });
      div.appendChild(b);
    });
    body.appendChild(div);
  });
}

function verificarQuiz(niv){
  if(sessao.quizOk) return;
  const key = String(niv.n);
  estado.tentativas[key] = (estado.tentativas[key]||0)+1; salvar();
  let todasCertas = true, respondidas = true;
  const body=document.getElementById("quizBody");
  const qs = body.querySelectorAll(".q");
  niv.quiz.forEach((q, qi)=>{
    const sel = sessao.sel[qi];
    const alts = qs[qi].querySelectorAll(".alt");
    if(sel===null){ respondidas=false; todasCertas=false; return; }
    sessao.ordem[qi].forEach((alt, ai)=>{
      const el=alts[ai]; el.classList.remove("sel");
      let fb = alt.fb ? '<span class="fb">'+alt.fb+'</span>' : "";
      if(alt.ok){ if(ai===sel || true){} }
      if(ai===sel && alt.ok){ el.classList.add("ok"); el.innerHTML=alt.txt+fb; }
      else if(ai===sel && !alt.ok){ el.classList.add("bad"); el.innerHTML=alt.txt+fb; todasCertas=false; }
      else if(alt.ok){ el.classList.add("ok"); el.innerHTML=alt.txt+'<span class="fb">Resposta correta. '+(alt.fb||"")+'</span>'; }
      else { el.innerHTML=alt.txt; }
    });
  });
  const res=document.getElementById("quizResult");
  if(!respondidas){ res.className="result bad"; res.textContent="Responda todas as questões."; return; }
  if(todasCertas){
    sessao.quizOk=true;
    res.className="result ok"; res.textContent="100% correto! Quiz concluído.";
    document.getElementById("btnVerificar").disabled=true;
    verificarConclusao(niv);
  } else {
    res.className="result bad";
    res.textContent="Ainda há erros. Veja os feedbacks, embaralhamos as alternativas — tente novamente.";
    const btn=document.getElementById("btnVerificar"); btn.textContent="Tentar novamente";
    btn.onclick=()=>{ sessao.ordem=niv.quiz.map(q=>shuffle(q.alts)); sessao.sel=niv.quiz.map(()=>null);
      renderQuiz(niv); res.textContent=""; btn.textContent="Verificar respostas";
      btn.onclick=null; btn.addEventListener("click", ()=>verificarQuiz(niv)); };
  }
}

function corrigirDisc(niv){
  const d=niv.discursiva;
  const resp = document.getElementById("discInput").value;
  const {perc, faltaram, passou} = corrigirDiscursiva(d, resp);
  const res=document.getElementById("discResult");
  const fb=document.getElementById("discFb");
  const pct=Math.round(perc*100);
  res.className = "result "+(passou?"ok":"bad");
  res.textContent = pct+"% dos conceitos-chave"+(passou?" — atingiu o corte!":"");
  if(passou){
    sessao.discOk=true;
    fb.innerHTML = '<div class="gab"><b>Resposta modelo:</b> '+d.gabarito+'</div>';
    verificarConclusao(niv);
  } else {
    let miss = faltaram.length ? '<p class="keymiss">Faltaram conceitos: <b>'+faltaram.join("</b>, <b>")+'</b>.</p>' : '';
    fb.innerHTML = miss + '<p class="tag">Reforce esses pontos e corrija novamente. O gabarito aparece após atingir o corte.</p>';
  }
}

function verificarConclusao(niv){
  if(sessao.quizOk && sessao.discOk){
    if(!estaConcluido(niv.n)){
      estado.concluidos.push(niv.n);
      estado.xp += XP_POR_NIVEL;
      salvar(); atualizarTopo();
      mostrarConcluido(niv, true);
    } else {
      mostrarConcluido(niv, false);
    }
  }
}

function mostrarConcluido(niv, novo){
  const area=document.getElementById("concluirArea");
  const idx = NIVEIS.findIndex(x=>x.n===niv.n);
  const proximo = NIVEIS[idx+1];
  let badgeHtml="";
  if(unidadeCompleta(niv.unidade) && (!proximo || proximo.unidade!==niv.unidade)){
    const un=UNIDADES.find(x=>x.u===niv.unidade);
    badgeHtml = '<div class="badge-pop">Badge conquistada: '+un.nome+' completa!</div>';
  }
  let btn;
  if(tudoConcluido()){
    btn='<button class="btn" id="btnProx" type="button">Ver tela de conclusão</button>';
  } else if(proximo){
    btn='<button class="btn" id="btnProx" type="button">Avançar para o Nível '+proximo.n+' →</button>';
  } else {
    btn='<button class="btn sec" id="btnProx" type="button">Voltar à trilha</button>';
  }
  area.innerHTML = '<div class="done-banner"><h3>Nível '+niv.n+' concluído</h3>'+
    (novo?'<p class="xpplus">+'+XP_POR_NIVEL+' XP</p>':'<p>Você já havia concluído este nível.</p>')+
    badgeHtml+'<p style="margin-top:12px">'+btn+'</p></div>';
  area.scrollIntoView({behavior:"smooth", block:"nearest"});
  document.getElementById("btnProx").addEventListener("click", ()=>{
    if(tudoConcluido()){ view.tela="final"; render(); }
    else if(proximo){ abrirNivel(idx+1); }
    else voltar();
    window.scrollTo(0,0);
  });
}

/* ------------------------- TELA FINAL ------------------------- */
function renderFinal(){
  let bh="";
  UNIDADES.forEach(un=> bh+='<div class="badge on" title="'+un.nome+'">U'+un.u+'</div>');
  app.innerHTML =
    '<div class="final"><h1>Parabéns — Treinamento concluído!</h1>'+
    '<p class="sub">Você percorreu as três unidades da apostila e está preparado para a prova.</p>'+
    '<div class="big">'+estado.xp+' XP</div>'+
    '<div class="fbadges">'+bh+'</div>'+
    '<p>18 níveis concluídos · Unidades 3, 4 e 5 · Ponteiros, Recursividade e Alocação de Memória.</p>'+
    '<p style="margin-top:18px"><button class="btn sec" id="btnTrilha" type="button">Revisar a trilha</button></p></div>';
  document.getElementById("btnTrilha").addEventListener("click", voltar);
}

/* ------------------------- RESET ------------------------- */
document.getElementById("btnReset").addEventListener("click", ()=>{
  if(confirm("Reiniciar todo o progresso? XP, níveis concluídos e badges serão apagados. Esta ação não pode ser desfeita.")){
    estado = estadoInicial(); salvar(); view={tela:"trilha",nivel:null}; render(); window.scrollTo(0,0);
  }
});

/* teclado: Esc volta à trilha quando dentro de um nível */
document.addEventListener("keydown", e=>{
  if(e.key==="Escape" && view.tela==="nivel"){ voltar(); }
});

render();
</script>
</body>
</html>
